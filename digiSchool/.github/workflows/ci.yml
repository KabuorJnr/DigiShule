name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Dependency audit
      run: npm audit --audit-level=high
      continue-on-error: true

    - name: Check migration naming
      run: |
        cd supabase/migrations
        bad=$(ls | grep -vE '^[0-9]{3,}_.*\.sql$' || true)
        if [ -n "$bad" ]; then
          echo "Non-standard migration filenames found:"
          echo "$bad"
          exit 1
        fi

    - name: Run linter
      run: npm run lint

    - name: Build project
      run: npm run build

    - name: Run tests
      run: npm run test
      env:
        VITE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
